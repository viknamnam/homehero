name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Copy lint (Section 9 banned phrases)
        run: node ../scripts/copy-lint.js
      - name: Preflight (locked stack guard)
        run: node ../scripts/preflight.js
